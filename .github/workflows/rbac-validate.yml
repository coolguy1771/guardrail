---
# Example workflow: copy this to your own repository to scan RBAC manifests on every PR.
#
# SECURITY NOTES:
#   - This workflow only reads RBAC manifests from the repository checkout.
#   - No user-supplied GitHub context values are interpolated into shell commands.
#   - The SARIF upload step requires the `security-events: write` permission.
name: RBAC Validate

on:
  push:
    branches: [main, master]
    paths:
      - '**.yaml'
      - '**.yml'
  pull_request:
    paths:
      - '**.yaml'
      - '**.yml'

concurrency:
  group: rbac-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rbac-validate:
    name: Validate RBAC manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required for uploading SARIF results

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.26'

      - name: Install guardrail
        run: go install github.com/coolguy1771/guardrail/cmd/guardrail@v0.1.8

      - name: Validate RBAC manifests (text output)
        run: guardrail validate --dir . --fail-on high
        continue-on-error: true  # let SARIF upload proceed even on failure

      - name: Generate SARIF report
        run: guardrail validate --dir . --fail-on none --output sarif > guardrail.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3
        with:
          sarif_file: guardrail.sarif
          category: guardrail-rbac
